seed: 42
sample_rate: 16000
n_mels: 64
hop_length: 512
n_fft: 1024
max_duration_seconds: 20.0
train_split: 0.8
val_split: 0.1
test_split: 0.1
classifier:
  type: logistic_regression
  C: 1.0
  max_iter: 5000
  class_weight: balanced
group_split:
  enabled: true
calibration:
  enabled: true
  method: platt
metrics:
  recall_target_for_fpr: 0.95
