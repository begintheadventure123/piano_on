seed: 42
sample_rate: 16000
n_mels: 64
hop_length: 512
n_fft: 1024
n_mfcc: 20
max_duration_seconds: 20.0
segment_seconds: 1.5
segment_hop_seconds: 0.5
min_segment_seconds: 0.35
train_split: 0.8
val_split: 0.1
test_split: 0.1
classifier:
  learning_rate: 0.05
  max_iter: 350
  max_leaf_nodes: 31
  min_samples_leaf: 20
  l2_regularization: 0.0
group_split:
  enabled: true
thresholding:
  policy: balanced_accuracy
  default: 0.5
  min_threshold: 0.05
  max_threshold: 0.95
  review_recall_target: 0.98
metrics:
  recall_target_for_fpr: 0.95
hard_positive_boosts:
  non_piano_weight: 3.0
  review_copy_piano_weight: 4.0
  review_copy_non_piano_weight: 3.0
  home_piano_dataset_weight: 8.0
  home_piano_path_weight: 8.0
  low_confidence_home_path_weight: 10.0
